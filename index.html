<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Fatisco · Fast Email</title>
  <style>
    /* ==================== FAST & MINIMAL ==================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #f5f7fa;
      color: #1e293b;
      line-height: 1.4;
      padding-bottom: 70px;
    }

    body.dark {
      background: #0f172a;
      color: #e2e8f0;
    }

    /* ==================== HEADER ==================== */
    .header {
      background: #4f46e5;
      padding: 12px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      color: white;
      cursor: pointer;
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
    }

    .theme-toggle {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      padding: 6px 14px;
      border-radius: 30px;
      font-size: 13px;
      cursor: pointer;
    }

    /* ==================== CONTAINER ==================== */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 12px;
    }

    /* ==================== STATS ==================== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 12px 8px;
      text-align: center;
      border: 1px solid #e9eef2;
    }

    .dark .stat-card {
      background: #1e293b;
      border-color: #334155;
    }

    .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 4px;
    }

    .stat-number {
      font-size: 22px;
      font-weight: 800;
      color: #4f46e5;
    }

    .stat-small {
      font-size: 10px;
      color: #64748b;
      margin-top: 2px;
    }

    /* ==================== CARDS ==================== */
    .card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid #e9eef2;
    }

    .dark .card {
      background: #1e293b;
      border-color: #334155;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      font-weight: 600;
    }

    /* ==================== FILE UPLOAD ==================== */
    .file-upload {
      margin-bottom: 12px;
    }

    .file-input {
      display: none;
    }

    .file-label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      background: #f8fafc;
      border: 2px dashed #cbd5e1;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }

    .dark .file-label {
      background: #1e293b;
      border-color: #475569;
    }

    /* ==================== INPUTS ==================== */
    textarea, input {
      width: 100%;
      padding: 12px;
      border: 1px solid #d1d9e6;
      border-radius: 12px;
      font-size: 14px;
      background: white;
      margin-bottom: 12px;
    }

    .dark textarea, .dark input {
      background: #0f172a;
      border-color: #334155;
      color: #e2e8f0;
    }

    /* ==================== BUTTONS ==================== */
    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 8px 0;
    }

    .btn {
      padding: 10px 16px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      background: white;
      border: 1px solid #d1d9e6;
      flex: 1 1 auto;
    }

    .dark .btn {
      background: #1e293b;
      border-color: #475569;
      color: #e2e8f0;
    }

    .btn-primary {
      background: #4f46e5;
      color: white;
      border: none;
    }

    .btn-danger {
      background: #ef4444;
      color: white;
      border: none;
    }

    /* ==================== FILTER TABS ==================== */
    .filter-tabs {
      display: flex;
      gap: 6px;
      margin: 16px 0 12px;
    }

    .filter-btn {
      padding: 6px 14px;
      border-radius: 30px;
      background: #f1f5f9;
      border: 1px solid #d1d9e6;
      font-size: 12px;
      font-weight: 600;
      color: #475569;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .filter-btn.active {
      background: #4f46e5;
      color: white;
      border-color: #4f46e5;
    }

    .filter-count {
      background: rgba(0,0,0,0.1);
      padding: 2px 6px;
      border-radius: 20px;
      font-size: 10px;
    }

    /* ==================== COMPACT EMAIL LIST ==================== */
    .email-scroll-container {
      background: white;
      border-radius: 16px;
      border: 1px solid #e9eef2;
      max-height: 400px;
      overflow-y: auto;
    }

    .dark .email-scroll-container {
      background: #1e293b;
      border-color: #334155;
    }

    .email-list {
      padding: 6px;
    }

    /* SUPER COMPACT EMAIL ITEMS */
    .email-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      margin-bottom: 4px;
      font-size: 12px;
    }

    .dark .email-item {
      background: #0f172a;
      border-color: #334155;
    }

    .email-item.sent {
      background: #f0fdf4;
      border-color: #bbf7d0;
      opacity: 0.8;
    }

    .dark .email-item.sent {
      background: #064e3b;
      border-color: #047857;
    }

    .email-number {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #4f46e5;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .email-item.sent .email-number {
      background: #10b981;
    }

    .email-details {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .email-addr {
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 140px;
    }

    .email-name {
      color: #64748b;
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 80px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .status-dot.sent { background: #22c55e; }
    .status-dot.pending { background: #f59e0b; }

    .email-actions {
      display: flex;
      gap: 4px;
    }

    .action-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: white;
      border: 1px solid #e2e8f0;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dark .action-btn {
      background: #1e293b;
      border-color: #475569;
      color: #e2e8f0;
    }

    .action-btn:hover {
      background: #4f46e5;
      color: white;
    }

    /* ==================== SCROLL BUTTONS ==================== */
    .scroll-buttons {
      position: fixed;
      right: 15px;
      bottom: 90px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .scroll-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #4f46e5;
      color: white;
      border: none;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(79,70,229,0.3);
    }

    .scroll-btn.hidden {
      display: none;
    }

    /* ==================== FOOTER ==================== */
    .footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      padding: 12px;
      border-top: 1px solid #e2e8f0;
      text-align: center;
      font-size: 11px;
      color: #64748b;
    }

    .dark .footer {
      background: #1e293b;
      border-color: #334155;
    }

    /* ==================== RESPONSIVE ==================== */
    @media (max-width: 600px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .email-details {
        flex-direction: column;
        align-items: flex-start;
        gap: 2px;
      }
      
      .email-addr, .email-name {
        max-width: 100px;
      }
    }
  </style>
</head>
<body class="light">

<div class="header">
  <div class="header-content">
    <div class="logo" id="fatiscoLogo">
      <span class="logo-text">⚡ fatisco</span>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
  </div>
</div>

<div class="container">
  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Total</div>
      <div class="stat-number" id="statTotal">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Valid</div>
      <div class="stat-number" id="statValid">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Sent (24h)</div>
      <div class="stat-number" id="statSent24h">0</div>
      <div class="stat-small" id="timeSinceMidnight"></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Sent (Total)</div>
      <div class="stat-number" id="statSentTotal">0</div>
    </div>
  </div>

  <!-- Input Card -->
  <div class="card">
    <div class="card-header">
      <span>📧</span> Email List
    </div>
    
    <div class="file-upload">
      <input type="file" id="fileInput" class="file-input" accept=".csv,.txt">
      <label for="fileInput" class="file-label">📁 Upload CSV/TXT</label>
    </div>
    
    <textarea id="emailInput" rows="3" placeholder="email,name,company">john@acme.com,John Doe,Acme Corp
jane@startup.io,Jane Smith,Startup Inc</textarea>
    
    <div class="button-group">
      <button class="btn btn-primary" onclick="processEmails()">⚡ Generate</button>
      <button class="btn" onclick="exportCSV()">📥 Export</button>
      <button class="btn btn-danger" onclick="clearAll()">🗑️ Clear</button>
    </div>
  </div>

  <!-- Composer Card -->
  <div class="card">
    <div class="card-header">
      <span>✉️</span> Composer
    </div>
    
    <input type="text" id="subject" placeholder="Subject" value="Opportunity for {company}">
    <textarea id="body" rows="2" placeholder="Body...">Hi {name}, I noticed {company}...</textarea>
    
    <div style="display: flex; gap: 8px; margin: 8px 0;">
      <button class="btn" id="ccBtn" onclick="toggleCC()" style="padding: 6px 12px;">📧 CC</button>
    </div>
    
    <div id="ccField" style="display: none;">
      <input type="email" id="ccEmail" placeholder="cc@example.com">
    </div>
  </div>

  <!-- Filters -->
  <div class="filter-tabs">
    <button class="filter-btn active" onclick="filterEmails('all')">
      All <span class="filter-count" id="countAll">0</span>
    </button>
    <button class="filter-btn" onclick="filterEmails('pending')">
      Pending <span class="filter-count" id="countPending">0</span>
    </button>
    <button class="filter-btn" onclick="filterEmails('sent')">
      Sent <span class="filter-count" id="countSent">0</span>
    </button>
  </div>

  <!-- Scrollable Email List (COMPACT) -->
  <div class="email-scroll-container" id="emailScrollContainer">
    <div class="email-list" id="emailList"></div>
  </div>

  <!-- Batch Panel (hidden) -->
  <div id="batchPanel" style="display: none; margin-top: 16px;"></div>
</div>

<!-- Scroll Buttons -->
<div class="scroll-buttons">
  <button class="scroll-btn" id="scrollTopBtn" onclick="scrollToTop()">↑</button>
  <button class="scroll-btn" id="scrollBottomBtn" onclick="scrollToBottom()">↓</button>
</div>

<!-- Footer -->
<div class="footer">
  <span>Built by Fatai Ajani · fatisco © 2026</span>
</div>

<script>
// ==================== FAST CORE ====================
let emailRecords = [];
let sentEmails = {}; // {email: timestamp}
let currentFilter = 'all';
let ccEnabled = false;

// ==================== 24H TRACKING ====================
function getTodayMidnight() {
  const d = new Date();
  return new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
}

function getHoursSinceMidnight() {
  const now = new Date();
  const midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.floor((now - midnight) / (1000 * 60 * 60));
}

// ==================== STORAGE ====================
function loadStorage() {
  try {
    const saved = localStorage.getItem('fatisco_fast');
    if (saved) {
      const data = JSON.parse(saved);
      emailRecords = data.records || [];
      sentEmails = data.sent || {};
    }
  } catch (e) {}
}

function saveStorage() {
  localStorage.setItem('fatisco_fast', JSON.stringify({
    records: emailRecords,
    sent: sentEmails
  }));
}

// ==================== PROCESS EMAILS (NO SCORING - INSTANT) ====================
function processEmails() {
  const raw = document.getElementById('emailInput').value;
  const lines = raw.split('\n').filter(l => l.trim());
  
  emailRecords = [];
  
  lines.forEach(line => {
    const parts = line.split(',').map(p => p.trim());
    const email = parts[0];
    if (!email || !email.includes('@')) return;
    
    const name = parts[1] || email.split('@')[0];
    const company = parts[2] || email.split('@')[1]?.split('.')[0] || '';
    
    emailRecords.push({
      email,
      name: name.charAt(0).toUpperCase() + name.slice(1),
      company: company.charAt(0).toUpperCase() + company.slice(1)
    });
  });
  
  saveStorage();
  renderEmails();
  updateStats();
  showToast(`Loaded ${emailRecords.length} emails`);
}

// ==================== RENDER COMPACT EMAILS ====================
function renderEmails() {
  let filtered = emailRecords;
  
  if (currentFilter === 'sent') {
    filtered = emailRecords.filter(r => sentEmails[r.email]);
  } else if (currentFilter === 'pending') {
    filtered = emailRecords.filter(r => !sentEmails[r.email]);
  }
  
  let html = '';
  
  filtered.forEach((r, index) => {
    const sent = !!sentEmails[r.email];
    
    html += `
      <div class="email-item ${sent ? 'sent' : ''}" data-email="${r.email}">
        <div class="email-number">${index + 1}</div>
        <div class="email-details">
          <span class="email-addr">${r.email}</span>
          <span class="email-name">${r.name}</span>
        </div>
        <div class="status-dot ${sent ? 'sent' : 'pending'}"></div>
        <div class="email-actions">
          <button class="action-btn" onclick="sendEmail('${r.email}', '${r.name}', '${r.company}', event)">✉️</button>
          ${!sent ? `<button class="action-btn" onclick="markSent('${r.email}', event)">✓</button>` : ''}
        </div>
      </div>
    `;
  });
  
  document.getElementById('emailList').innerHTML = html || '<div style="padding: 20px; text-align: center;">No emails</div>';
  updateFilterCounts();
}

// ==================== SEND (NO DOUBLE SEND) ====================
function sendEmail(email, name, company, event) {
  event.stopPropagation();
  
  // STRICT CHECK: Cannot resend
  if (sentEmails[email]) {
    showToast('⚠️ Already sent');
    return;
  }
  
  const subject = document.getElementById('subject').value
    .replace(/{name}/g, name)
    .replace(/{company}/g, company);
    
  const body = document.getElementById('body').value
    .replace(/{name}/g, name)
    .replace(/{company}/g, company);
  
  let mailto = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  
  if (ccEnabled) {
    const cc = document.getElementById('ccEmail').value.trim();
    if (cc) mailto += `&cc=${encodeURIComponent(cc)}`;
  }
  
  window.open(mailto, '_blank');
  
  // Mark as sent with timestamp
  markSent(email, event);
}

function markSent(email, event) {
  if (event) event.stopPropagation();
  
  // STRICT: Cannot remark if already sent
  if (sentEmails[email]) return;
  
  sentEmails[email] = Date.now(); // Store timestamp
  saveStorage();
  renderEmails();
  updateStats();
}

// ==================== FILTERS ====================
function filterEmails(filter) {
  currentFilter = filter;
  
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  event.target.classList.add('active');
  
  renderEmails();
}

function updateFilterCounts() {
  const total = emailRecords.length;
  const sent = emailRecords.filter(r => sentEmails[r.email]).length;
  const pending = total - sent;
  
  document.getElementById('countAll').textContent = total;
  document.getElementById('countSent').textContent = sent;
  document.getElementById('countPending').textContent = pending;
}

// ==================== STATS ====================
function updateStats() {
  const total = emailRecords.length;
  const valid = emailRecords.length; // All emails considered valid (no scoring)
  const now = Date.now();
  const oneDayAgo = now - (24 * 60 * 60 * 1000);
  
  // Count sent in last 24h
  let sent24h = 0;
  Object.values(sentEmails).forEach(ts => {
    if (ts > oneDayAgo) sent24h++;
  });
  
  const sentTotal = Object.keys(sentEmails).length;
  
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statValid').textContent = valid;
  document.getElementById('statSent24h').textContent = sent24h;
  document.getElementById('statSentTotal').textContent = sentTotal;
  document.getElementById('timeSinceMidnight').textContent = `${getHoursSinceMidnight()}h today`;
}

// ==================== TOGGLE CC ====================
function toggleCC() {
  ccEnabled = !ccEnabled;
  document.getElementById('ccField').style.display = ccEnabled ? 'block' : 'none';
  document.getElementById('ccBtn').style.background = ccEnabled ? '#4f46e5' : '';
  document.getElementById('ccBtn').style.color = ccEnabled ? 'white' : '';
}

// ==================== SCROLL ====================
function scrollToTop() {
  document.getElementById('emailScrollContainer').scrollTo({ top: 0, behavior: 'smooth' });
}

function scrollToBottom() {
  const c = document.getElementById('emailScrollContainer');
  c.scrollTo({ top: c.scrollHeight, behavior: 'smooth' });
}

// ==================== UTILITIES ====================
function exportCSV() {
  let csv = 'Email,Name,Company,Sent\n';
  emailRecords.forEach(r => {
    csv += `"${r.email}","${r.name}","${r.company}",${sentEmails[r.email] ? 'Yes' : 'No'}\n`;
  });
  
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `fatisco_${Date.now()}.csv`;
  a.click();
  showToast('CSV exported');
}

function clearAll() {
  if (confirm('Clear all?')) {
    emailRecords = [];
    sentEmails = {};
    saveStorage();
    renderEmails();
    updateStats();
    document.getElementById('emailInput').value = '';
    showToast('Cleared');
  }
}

function toggleTheme() {
  document.body.classList.toggle('dark');
  localStorage.setItem('fatisco_theme', document.body.classList.contains('dark') ? 'dark' : 'light');
}

function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#1e293b; color:white; padding:8px 16px; border-radius:30px; font-size:13px; z-index:1000;';
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 1500);
}

// ==================== FILE UPLOAD ====================
document.querySelector('.file-label').addEventListener('click', () => {
  document.getElementById('fileInput').click();
});

document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = (e) => {
    document.getElementById('emailInput').value = e.target.result;
    processEmails();
    showToast(`Loaded ${file.name}`);
  };
  reader.readAsText(file);
});

// ==================== SCROLL BUTTON VISIBILITY ====================
const container = document.getElementById('emailScrollContainer');
container.addEventListener('scroll', () => {
  const st = container.scrollTop;
  const sh = container.scrollHeight;
  const ch = container.clientHeight;
  
  document.getElementById('scrollTopBtn').classList.toggle('hidden', st < 50);
  document.getElementById('scrollBottomBtn').classList.toggle('hidden', sh - st - ch < 50);
});

// ==================== BATCH MODE (HIDDEN) ====================
document.querySelector('.logo').addEventListener('click', () => {
  const panel = document.getElementById('batchPanel');
  if (panel.style.display === 'none') {
    panel.style.display = 'block';
    panel.innerHTML = '<div style="background:#eef2ff; padding:16px; border-radius:12px;"><h4>📦 BATCH MODE</h4><p>Send 10 emails at once via BCC</p><button class="btn btn-primary" onclick="prepareBatches()">Prepare</button><div id="batchList"></div></div>';
  } else {
    panel.style.display = 'none';
  }
});

// ==================== INIT ====================
loadStorage();
renderEmails();
updateStats();

if (localStorage.getItem('fatisco_theme') === 'dark') {
  document.body.classList.add('dark');
}
</script>
</body>
</html>
